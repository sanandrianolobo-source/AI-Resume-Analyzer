name: ATS System CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Basic Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic

    - name: Robot Check
      run: echo "Robot CI/CD berhasil terhubung dan berjalan!"
